<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Repsol Benefits</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <!-- SVG for Repsol R (abstract approximation) -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="url(#paint0_linear)" stroke-width="4"/>
          <path d="M12 6C15.3137 6 18 8.68629 18 12" stroke="#FF8A00" stroke-width="4" stroke-linecap="round"/>
          <defs>
            <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FF512F"/>
              <stop offset="1" stop-color="#F09819"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>Repsol Benefits</h1>
    </div>
    
    <div class="status-card">
      <div class="status-header">
        <span class="status-dot"></span>
        <span id="sync-status">Active</span>
      </div>
      <div class="stats">
        <div class="stat-item">
          <span class="stat-value" id="brands-count">-</span>
          <span class="stat-label">Brands tracked</span>
        </div>
      </div>
      <div class="last-sync">
        Last Sync: <span id="sync-date">Never</span>
      </div>
    </div>

    <div class="search-section">
      <input type="text" id="search-input" class="glass-input" placeholder="Search brands... (e.g. Amazon)">
      <div id="search-results" class="search-results hidden">
        <ul id="results-list"></ul>
      </div>
    </div>

    <div class="action-section">
      <button id="sync-btn" class="glass-btn">
        <svg class="sync-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
        Sync Benefits
      </button>
      <p class="helper-text">You must be logged into <strong>areacliente.repsol.es</strong> for sync to work.</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
